# Chutes Deployment Configuration
# For Vocence Subnet 78 Hybrid TTS Miner

# Chute metadata
name: vocence-hybrid-t2-best6-YOUR_USERNAME  # IMPORTANT: Replace YOUR_USERNAME
version: 1.0.0
description: "Hybrid Vocence TTS miner combining T2 base model with best-of-6 sampling. Expected 90-95% pass rate."

# Hardware requirements
resources:
  # Minimum GPU specs (RTX 4090 / A5000 / A6000 class)
  gpu:
    vram_gb: 24              # T2 requires 24GB VRAM minimum
    compute_capability: 8.0  # CUDA compute capability
  
  # CPU and memory
  cpu_cores: 8
  ram_gb: 32
  
  # Storage for model weights + cache
  disk_gb: 50

# Runtime environment
environment:
  # Base image with CUDA support
  base_image: nvidia/cuda:12.1.0-cudnn8-runtime-ubuntu22.04
  
  # Python version
  python_version: "3.10"
  
  # Required Python packages
  dependencies:
    - torch>=2.0.0
    - torchaudio>=2.0.0
    - transformers>=4.40.0
    - qwen-tts>=0.1.0
    - faster-whisper>=1.0.0
    - utmosv2>=1.3.0
    - numpy>=1.24.0
    - pyyaml>=6.0
    - soundfile>=0.12.0
  
  # Environment variables
  env_vars:
    TRANSFORMERS_CACHE: /workspace/.cache/huggingface
    HF_HOME: /workspace/.cache/huggingface
    CUDA_VISIBLE_DEVICES: "0"

# Model files to include
files:
  - miner.py                # Main miner implementation
  - vocence_config.yaml     # Configuration file
  - config.json            # Model config (from T2 base)
  - generation_config.json # Generation config (from T2 base)
  - model-*.safetensors    # Model weights (from T2 base)
  - tokenizer.json         # Tokenizer (from T2 base)
  - vocab.json             # Vocabulary (from T2 base)
  - merges.txt             # BPE merges (from T2 base)

# Entry point
entrypoint:
  module: miner
  class: Miner
  init_args:
    path_hf_repo: /workspace/model

# Health check
health_check:
  endpoint: /health
  interval_sec: 60
  timeout_sec: 10
  retries: 3

# Scaling settings
scaling:
  min_replicas: 1
  max_replicas: 1
  auto_scale: false

# Logging
logging:
  level: INFO
  format: json
  
# Networking
network:
  # Validator endpoints will call your chute via HTTP
  expose_ports:
    - 8000  # Default Chutes HTTP port

# Cost and billing
billing:
  # Chutes typically charge setup fees + per-request fees
  accept_fees: true  # Must accept to deploy

# Subnet-specific settings
subnet:
  network: bittensor
  subnet_id: 78
  subnet_name: vocence
  
  # Miner identity (set during registration)
  hotkey: ""  # Will be set when you register
  coldkey: ""  # Will be set when you register

# Validation constraints (from Vocence docs)
validation:
  # Miner contract requirements
  required_methods:
    - warmup
    - generate_wav
  
  # Expected performance
  expected_latency_p95_sec: 130
  expected_pass_rate: 0.90
  expected_avg_score: 0.93

# Notes for deployment
notes: |
  DEPLOYMENT CHECKLIST:
  
  1. BEFORE DEPLOYMENT:
     - Replace YOUR_USERNAME in name field above
     - Ensure you have a HuggingFace account
     - Download T2 base model weights from macminix/qwen3_voice_design_t2
     - Copy model files to this directory
     - Test miner.py locally first (see README.md)
  
  2. CHUTES SETUP:
     - Install Chutes CLI: pip install chutes-cli
     - Login: chutes login
     - Initialize: chutes init --from chute_config.yml
  
  3. DEPLOYMENT:
     - Build: chutes build --wait
     - Deploy: chutes deploy --accept-fee
     - Note your Chute UUID from output
  
  4. SUBNET REGISTRATION:
     - Contact Vocence team for registration permissions
     - Register with: btcli subnet register --netuid 78 --wallet.name YOUR_WALLET
     - Link Chute UUID to your hotkey
  
  5. MONITORING:
     - Check validator evaluations: btcli subnet list --netuid 78
     - Monitor Chute logs: chutes logs --follow
     - Track earnings: Check your wallet balance
  
  For detailed instructions, see DEPLOYMENT_GUIDE.md
